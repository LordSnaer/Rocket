    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    enable_groot_monitoring: True
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_to_pose_bt_xml: "/home/rocket/rocket_ws/src/rocket/behavior_trees/navigate_to_pose_no_recovery.xml"
    default_nav_through_poses_bt_xml: "/home/rocket/rocket_ws/src/rocket/behavior_trees/navigate_to_pose_no_recovery.xml"
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_distance_traveled_condition_bt_node
    - nav2_compute_route_bt_node
    - nav2_compute_and_track_route_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    transform_tolerance: 1.0
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    # Keep thresholds tiny so small commanded velocities are not clipped to 0.
    # min_y was 0.5 before, which silently killed all sideways motion.
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 2.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      # Symmetric holonomic robot: any final orientation is acceptable.
      # Stock Nav2 has no symmetric_yaw_tolerance flag, so open the tolerance wide.
      yaw_goal_tolerance: 0.20
      stateful: True

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True

      # Per-axis box (the rectangle in vx/vy space).
      min_vel_x: -0.40
      max_vel_x:  0.40
      min_vel_y: -0.30
      max_vel_y:  0.30
      min_vel_theta: -0.5
      max_vel_theta: 0.5

      # Circular magnitude cap on the linear velocity vector — this is the
      # "max speed in any direction" knob that MPPI did not have. With this
      # set, diagonal motion is bounded by max_speed_xy, not the box corners.
      min_speed_xy: 0.0
      max_speed_xy: 0.40
      min_speed_theta: 0.0

      acc_lim_x: 1.5
      acc_lim_y: 1.5
      acc_lim_theta: 2.0
      decel_lim_x: -1.5
      decel_lim_y: -1.5
      decel_lim_theta: -2.0

      # Omni sampling: vy_samples > 1 makes DWB explore sideways trajectories.
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 10
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True

      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      ObstacleFootprint.scale: 1.0
      ObstacleFootprint.sum_scores: false
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0


controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      transform_tolerance: 0.5
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[[0.51, 0.315], [0.51, -0.315], [-0.51, -0.315], [-0.51, 0.315]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.1
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /merged
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          inf_is_valid: true
          expected_update_rate: 0.3
      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      transform_tolerance: 0.5
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      map_subscribe_transient_local: True
      footprint: "[[0.51, 0.315], [0.51, -0.315], [-0.51, -0.315], [-0.51, 0.315]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /merged
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          inf_is_valid: true
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.1
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "turtlebot3_world.yaml"

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5000
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: False

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    transform_tolerance: 1.0
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: true
      downsample_factor: 2
      allow_unknown: true
      max_iterations: 1000000
      max_planning_time: 1.5
      use_final_approach_orientation: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

route_server:
  ros__parameters:
    use_sim_time: True
    base_frame: "base_link"
    route_frame: "map"
    path_density: 0.05
    max_iterations: 0
    max_planning_time: 2.0
    smooth_corners: true
    smoothing_radius: 0.3
    costmap_topic: "global_costmap/costmap_raw"
    tracker_update_rate: 50.0
    aggregate_blocked_ids: false
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 1.0
    max_prune_dist_from_edge: 8.0

    graph_filepath: "/home/rocket/rocket_ws/src/rocket/config/route_graph.geojson"
    graph_file_loader: "GeoJsonGraphFileLoader"
    GeoJsonGraphFileLoader:
      plugin: "nav2_route::GeoJsonGraphFileLoader"

    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"
      weight: 1.0
      max_cost: 253.0
      use_maximum: true
      invalid_on_collision: true
      invalid_off_map: true

    operations: ["AdjustSpeedLimit", "ReroutingService"]
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    ReroutingService:
      plugin: "nav2_route::ReroutingService"

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.4
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True
